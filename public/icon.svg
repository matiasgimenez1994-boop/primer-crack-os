<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo verde oscuro -->
  <rect width="512" height="512" rx="80" fill="#1A3327"/>

  <!-- Grano de café -->
  <ellipse cx="220" cy="260" rx="110" ry="170" transform="rotate(-8 220 260)" fill="#22C55E"/>

  <!-- Surco central del grano -->
  <path d="M175 110 Q200 200 190 260 Q180 320 185 400"
    stroke="#1A3327" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Crack / primer crack -->
  <path d="M260 180 L310 145 L285 210 L340 190"
    stroke="#22C55E" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Rayos de energía -->
  <line x1="315" y1="140" x2="370" y2="95" stroke="#22C55E" stroke-width="14" stroke-linecap="round"/>
  <line x1="345" y1="175" x2="400" y2="160" stroke="#22C55E" stroke-width="12" stroke-linecap="round"/>
  <line x1="340" y1="215" x2="390" y2="220" stroke="#22C55E" stroke-width="10" stroke-linecap="round"/>

  <!-- Chispas -->
  <circle cx="380" cy="95" r="14" fill="#22C55E" opacity="0.8"/>
  <circle cx="410" cy="140" r="10" fill="#22C55E" opacity="0.6"/>
</svg>
